name: DevSecOps Pipeline

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  secret-scanning:
    name: Gitleaks Secret Scan
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Gitleaks
        run: |
          GITLEAKS_VERSION=8.24.2
          wget https://github.com/gitleaks/gitleaks/releases/download/v${GITLEAKS_VERSION}/gitleaks_${GITLEAKS_VERSION}_linux_x64.tar.gz
          tar -xzf gitleaks_${GITLEAKS_VERSION}_linux_x64.tar.gz
          sudo mv gitleaks /usr/local/bin/

      - name: Run Gitleaks
        run: |
          mkdir -p reports

          # SARIF é um padrão aberto para troca de resultados de
          # ferramentas de segurança e análise estática.
          gitleaks detect \
            --source . \
            --report-format sarif \
            --report-path reports/gitleaks.sarif

      - name: Upload Gitleaks Report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: gitleaks-report
          path: reports/gitleaks.sarif

  lint:
    name: ESLint Analysis
    runs-on: ubuntu-latest
    needs: secret-scanning

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install Dependencies
        run: npm ci

      - name: Run ESLint
        run: npx eslint .

  semgrep:
    name: Semgrep SAST
    runs-on: ubuntu-latest
    needs: lint

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Semgrep
        run: |
          python3 -m pip install semgrep

      - name: Run Semgrep
        run: |
          mkdir -p reports

          semgrep scan \
            --config auto \
            --sarif \
            --output reports/semgrep.sarif

      - name: Upload Semgrep Report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: semgrep-report
          path: reports/semgrep.sarif